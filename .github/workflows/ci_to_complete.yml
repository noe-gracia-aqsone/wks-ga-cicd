name: Continuous Integration
run-name: CI - ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: write-all

jobs:
  train-and-report:
    runs-on: ubuntu-latest
    env:
          PYTHON_VERSION: "3.11"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # TODO 1: import setup-cml with: vega: false
      # and setup-dvc with no extra configuration
      #- uses: TODO: import setup-cml
      #  with:
      #    vega: false
      #- uses: TODO: import setup-dvc
  
      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # TODO 2: Pull imported dataset metadata/content and run training
      #- name: Train with DVC import
      #  run: |
          # TODO: pull the dataset tracked by DVC
          # TODO: run the training pipeline through DVC repro

      - name: Create CML report
        run: |
          echo "## Model Metrics" > report.md
          cat ./results/metrics.json >> report.md
          echo -e "\n## Confusion Matrix Plot" >> report.md
          echo '![Confusion Matrix](./results/model_results.png)' >> report.md
          echo -e "\n## Data Version (DVC)" >> report.md
          echo "- Import repo: $(grep 'url:' data/drug200.csv.dvc | sed 's/.*url: //')" >> report.md
          echo "- Locked revision: $(grep 'rev_lock:' data/drug200.csv.dvc | sed 's/.*rev_lock: //')" >> report.md
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin main --depth=1
            echo -e "\n## Metrics Diff vs main" >> report.md
            dvc metrics diff origin/main --md >> report.md
          fi

