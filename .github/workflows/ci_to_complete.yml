name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: write-all

jobs:
  train-and-report:
    runs-on: ubuntu-latest
    env:
          PYTHON_VERSION: "3.11"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # TODO 1: import setup-cml with: vega: false
      # and setup-dvc with no extra configuration
      #- uses: TODO: import setup-cml
      #  with:
      #    vega: false
      #- uses: TODO: import setup-dvc
  
      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      # TODO 2: Pull imported dataset metadata/content and run training
      #- name: Train with DVC import
      #  run:
        	# TODO: pull the dataset tracked by DVC
        	# TODO: run the training pipeline through DVC repro

      - name: Create CML report and comment PR
        run: |
          echo "## Model Metrics" > report.md
          cat ./results/metrics.txt >> report.md
          echo -e "\n## Confusion Matrix Plot" >> report.md
          echo '![Confusion Matrix](./results/model_results.png)' >> report.md
          echo -e "\n## Data Version (DVC)" >> report.md
          dvc status -c >> report.md 2>&1 || echo "DVC status unavailable" >> report.md
          # TODO: CREATE CML MARKDOWN COMMENT
