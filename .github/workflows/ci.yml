name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: write-all

jobs:
  train-and-report:
    runs-on: ubuntu-latest
    env:
          PYTHON_VERSION: "3.11"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: iterative/setup-cml@v2
        with:
          vega: false
      - uses: iterative/setup-dvc@v1
  
      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Train with DVC import
        run: |
          dvc pull data/drug200.csv.dvc
          dvc repro

      - name: Create CML report and comment PR
        run: |
          echo "## Model Metrics" > report.md
          cat ./results/metrics.txt >> report.md
          echo -e "\n## Confusion Matrix Plot" >> report.md
          echo '![Confusion Matrix](./results/model_results.png)' >> report.md
          echo -e "\n## Data Version (DVC)" >> report.md
          dvc status -c >> report.md 2>&1 || echo "DVC status unavailable" >> report.md
          cml comment create report.md
