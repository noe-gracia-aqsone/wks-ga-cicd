name: Continuous Integration
run-name: CI - ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions: write-all

jobs:
  train-and-report:
    runs-on: ubuntu-latest
    env:
          PYTHON_VERSION: "3.11"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: iterative/setup-cml@v2
        with:
          vega: false
      - uses: iterative/setup-dvc@v1
  
      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create model directory
        run: mkdir -p model
        
      - name: Train with DVC import
        run: |
          dvc pull data/drug200.csv.dvc
          dvc repro

      - name: Create CML report
        run: |
          echo "## Model Metrics" > report.md
          cat ./results/metrics.json >> report.md
          echo -e "\n## Confusion Matrix Plot" >> report.md
          echo '![Confusion Matrix](./results/model_results.png)' >> report.md
          echo -e "\n## Data Version (DVC)" >> report.md
          echo "- Import repo: $(grep 'url:' data/drug200.csv.dvc | sed 's/.*url: //')" >> report.md
          echo "- Locked revision: $(grep 'rev_lock:' data/drug200.csv.dvc | sed 's/.*rev_lock: //')" >> report.md
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin main --depth=1
            echo -e "\n## Metrics Diff vs main" >> report.md
            dvc metrics diff origin/main --md >> report.md
          fi

      - name: Comment PR with CML
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create report.md
